{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 100px auto;" class="card">
    <h2 style="text-align: center;">Screen1: 登入</h2>
    <p>請輸入您的帳號密碼</p>
    <input type="text" placeholder="使用者名稱" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
    <input type="password" placeholder="密碼" style="width:100%; padding:10px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
    
    <button class="btn-green" style="width: 100%;" onclick="window.location.href='/board'">登入</button>
    <p style="text-align: center; margin-top: 15px;">
        <a href="/register" style="color: var(--primary-green);">註冊新帳號</a>
    </p>
</div>
{% endblock %}
