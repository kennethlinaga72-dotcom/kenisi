{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto;" class="card">
    <h2 style="text-align: center;">Screen3: 註冊</h2>
    <p style="text-align: center; color: #666;">建立您的新帳號</p>
    
    <label>使用者名稱</label>
    <input type="text" placeholder="請輸入帳號" style="width:100%; padding:10px; margin:10px 0 20px 0; border-radius:10px; border:1px solid #ddd;">
    
    <label>電子郵件</label>
    <input type="email" placeholder="example@mail.com" style="width:100%; padding:10px; margin:10px 0 20px 0; border-radius:10px; border:1px solid #ddd;">
    
    <label>設定密碼</label>
    <input type="password" placeholder="至少 6 位字元" style="width:100%; padding:10px; margin:10px 0 20px 0; border-radius:10px; border:1px solid #ddd;">
    
    <button class="btn-green" style="width: 100%;">完成註冊</button>
    <p style="text-align: center; margin-top: 15px;">
        <a href="/" style="color: #666; text-decoration: none;">← 回到登入頁面</a>
    </p>
</div>
{% endblock %}
